name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    environment: PHP

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit --configuration phpunit.xml.dist

      - name: Check integration secrets
        run: |
          echo "MYGEOTAB_USERNAME set: ${{ secrets.MYGEOTAB_USERNAME != '' }}"
          echo "MYGEOTAB_PASSWORD set: ${{ secrets.MYGEOTAB_PASSWORD != '' }}"
          echo "MYGEOTAB_DATABASE set: ${{ secrets.MYGEOTAB_DATABASE != '' }}"
          echo "MYGEOTAB_SERVER set: ${{ secrets.MYGEOTAB_SERVER != '' }}"

      - name: Run integration tests
        run: vendor/bin/phpunit --testsuite integration --configuration phpunit.xml.dist
        env:
          MYGEOTAB_USERNAME: ${{ secrets.MYGEOTAB_USERNAME }}
          MYGEOTAB_PASSWORD: ${{ secrets.MYGEOTAB_PASSWORD }}
          MYGEOTAB_DATABASE: ${{ secrets.MYGEOTAB_DATABASE }}
          MYGEOTAB_SERVER: ${{ secrets.MYGEOTAB_SERVER }}
